<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Division</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background-color: #1C1E23;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .progress-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6rem;
      padding-top: 1rem;
      gap: 3rem;
      position: relative;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-bottom: 1rem;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .step-text {
      color: #D4A74B;
      text-decoration: none;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .step.inactive .step-text {
      color: #6C6E73;
    }

    .step-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .progress-line {
      position: absolute;
      bottom: 0;
      height: 2px;
      background-color: #D4A74B;
      transition: width 0.3s ease;
      width: 0;
    }

    .step.active .progress-line {
      width: 100%;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 1rem;
      margin-top: -2rem;
    }

    .section {
      width: 100%;
      max-width: 600px;
      display: none;
    }

    .section.active {
      display: block;
    }

    .input-label {
      color: #ffffff;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .input-field {
      width: 100%;
      padding: 1rem;
      background-color: #282A30;
      border: 1px solid #3A3C42;
      border-radius: 6px;
      color: #ffffff;
      font-size: 1.1rem;
    }

    .input-field:focus {
      outline: none;
      border-color: #D4A74B;
    }

    .input-field::placeholder {
      color: #6C6E73;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 2rem 1rem;
    }

    .buttons-group {
      display: flex;
      gap: 0.5rem;
    }

    .btn-cancel {
      color: #D4A74B;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.75rem 1rem;
    }

    .btn-next {
      background-color: #D4A74B;
      color: #1C1E23;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
    }

    .btn-cancel:hover {
      color: #E5B85C;
    }

    .btn-next:hover {
      background-color: #E5B85C;
    }
  </style>
</head>

<body>
  <div class="progress-container">
    <div class="step active">
      <div class="step-header">
        <span class="step-text" onclick="switchSection('new-division')">1. New Division</span>
        <div class="step-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#D4A74B" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8l4 4-4 4M8 12h8"></path>
          </svg>
        </div>
      </div>
      <div class="progress-line"></div>
    </div>
    <div class="step inactive">
      <div class="step-header">
        <span class="step-text" onclick="switchSection('player-selection')">2. Division Player selection</span>
        <div class="step-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#6C6E73" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8l4 4-4 4M8 12h8"></path>
          </svg>
        </div>
      </div>
      <div class="progress-line"></div>
    </div>
  </div>

  <div class="main-content">
    <div id="new-division" class="section active">
      <div class="input-label">Division Name</div>
      <input type="text" class="input-field" placeholder="Enter division name">
    </div>
    <div id="player-selection" class="section">
      <div class="input-label">Player Selection</div>
      <!-- Add player selection content here -->
    </div>
  </div>

  <div class="footer">
    <div class="buttons-group">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-next" onclick="handleNext()">Next</button>
    </div>
  </div>

  <script>
    function switchSection(sectionId) {
      // Update sections
      document.querySelectorAll('.section').forEach(section => {
        section.classList.remove('active');
      });
      document.getElementById(sectionId).classList.add('active');

      // Update steps
      const steps = document.querySelectorAll('.step');
      if (sectionId === 'player-selection') {
        steps[0].classList.remove('active');
        steps[0].classList.add('inactive');
        steps[1].classList.remove('inactive');
        steps[1].classList.add('active');
        // Update icon colors
        steps[0].querySelector('svg').setAttribute('stroke', '#6C6E73');
        steps[1].querySelector('svg').setAttribute('stroke', '#D4A74B');
      } else {
        steps[0].classList.remove('inactive');
        steps[0].classList.add('active');
        steps[1].classList.remove('active');
        steps[1].classList.add('inactive');
        // Update icon colors
        steps[0].querySelector('svg').setAttribute('stroke', '#D4A74B');
        steps[1].querySelector('svg').setAttribute('stroke', '#6C6E73');
      }
    }

    function handleNext() {
      switchSection('player-selection');
    }
  </script>
</body>

</html>
